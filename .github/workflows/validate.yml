name: Validate & test

# Gate every PR and every push to main. Single job, scaled to this repo's
# size: one npm workspace, no Python/build-artifact step (unlike the main
# modelglass repo's multi-job graph — see that repo's
# .github/workflows/validate.yml for the pattern this is adapted from).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    name: Typecheck + test all examples
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Typecheck (strict, all examples)
        run: npx tsc --noEmit
      - name: Run tests (all examples)
        run: npm test

  # SCO-197: the modelglass site fetches this repo's READMEs live at build
  # time via the GitHub Contents API (apps/web/src/lib/router-examples.ts) —
  # unlike the other sibling data repos, nothing here is mirrored into a
  # modelglass-main commit, so a merge to this repo's main previously never
  # triggered a site rebuild. Content only went live on modelglass main's
  # *next unrelated* deploy (confirmed stale twice on 2026-07-12: SCO-165's
  # 5 PRs and SCO-190's shot-plan-compiler both sat live-but-unpublished
  # until an unrelated docs commit happened to redeploy the site). This job
  # closes that gap by firing the modelglass site's Vercel deploy hook
  # directly whenever main here changes and passes validate.
  deploy-site:
    name: Trigger modelglass site rebuild
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Fire Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL" -o /dev/null
